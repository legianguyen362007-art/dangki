<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng Ký</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      min-height: 100vh;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .card {
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 360px;
      padding: 36px 32px;
    }
    h4 { font-weight: 700; color: #222; }
    .form-control {
      border-radius: 8px;
      padding: 11px 14px;
      border: 1.5px solid #ddd;
    }
    .form-control:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 0.15rem rgba(79,70,229,0.15);
    }
    .btn-register {
      background: #4f46e5;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-weight: 600;
      color: #fff;
      width: 100%;
    }
    .btn-register:hover { background: #4338ca; color: #fff; }
    a { color: #4f46e5; }
  </style>
</head>
<body>
<div class="card">
  <h4 class="mb-1">Đăng ký</h4>
  <p class="text-muted small mb-4">Tạo tài khoản mới</p>

  <form>
    <div class="mb-3">
      <label class="form-label fw-semibold small">Gmail</label>
      <input type="email" class="form-control" placeholder="example@gmail.com" required/>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold small">Mật khẩu</label>
      <input type="password" class="form-control" placeholder="Nhập mật khẩu" required/>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold small">Xác nhận mật khẩu</label>
      <input type="password" class="form-control" placeholder="Nhập lại mật khẩu" required/>
    </div>
    <button type="submit" class="btn-register mb-3">Đăng ký</button>
    <p class="text-center small mb-0">
      Đã có tài khoản? <a href="login.html" class="fw-semibold text-decoration-none">Đăng nhập</a>
    </p>
    <p class="text-center small mt-2 mb-0">
      <a href="index.html" class="text-muted text-decoration-none">← Về trang chủ</a>
    </p>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
